<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Recipe Tracker</h1>
    <div class="header-actions">
      <button id="new-recipe-btn" class="btn btn-primary">+ New Recipe</button>
      <button id="import-btn" class="btn">Import</button>
      <button id="export-btn" class="btn">Export</button>
      <input type="file" id="import-file" accept="application/json" hidden />
    </div>
  </header>

  <main class="app-main">
    <aside class="sidebar">
      <div class="search-controls">
        <input type="search" id="search-input" placeholder="Search recipes..." />
        <select id="category-filter">
          <option value="">All categories</option>
        </select>
        <label class="favorites-toggle">
          <input type="checkbox" id="favorites-only" />
          Favorites only
        </label>
      </div>
      <ul id="recipe-list" class="recipe-list"></ul>
      <p id="empty-state" class="empty-state">No recipes yet. Click "New Recipe" to add one.</p>
    </aside>

    <section class="content" id="content-area">
      <div class="placeholder" id="placeholder">
        <p>Select a recipe or create a new one.</p>
      </div>

      <article class="recipe-view" id="recipe-view" hidden>
        <div class="view-header">
          <h2 id="view-title"></h2>
          <div class="view-actions">
            <button id="favorite-btn" class="icon-btn" title="Toggle favorite">&#9734;</button>
            <button id="edit-btn" class="btn">Edit</button>
            <button id="delete-btn" class="btn btn-danger">Delete</button>
          </div>
        </div>
        <div class="meta" id="view-meta"></div>
        <div class="tags" id="view-tags"></div>
        <section>
          <h3>Ingredients</h3>
          <ul id="view-ingredients"></ul>
        </section>
        <section>
          <h3>Instructions</h3>
          <ol id="view-instructions"></ol>
        </section>
        <section id="view-notes-section">
          <h3>Notes</h3>
          <p id="view-notes"></p>
        </section>
      </article>

      <form class="recipe-form" id="recipe-form" hidden>
        <h2 id="form-title">New Recipe</h2>
        <label>
          Title
          <input type="text" id="f-title" required />
        </label>
        <div class="form-row">
          <label>
            Category
            <input type="text" id="f-category" placeholder="e.g. Dinner, Dessert" />
          </label>
          <label>
            Servings
            <input type="number" id="f-servings" min="1" />
          </label>
        </div>
        <div class="form-row">
          <label>
            Prep time (min)
            <input type="number" id="f-prep" min="0" />
          </label>
          <label>
            Cook time (min)
            <input type="number" id="f-cook" min="0" />
          </label>
        </div>
        <label>
          Tags (comma-separated)
          <input type="text" id="f-tags" placeholder="quick, vegetarian" />
        </label>
        <label>
          Ingredients (one per line)
          <textarea id="f-ingredients" rows="6" required></textarea>
        </label>
        <label>
          Instructions (one step per line)
          <textarea id="f-instructions" rows="8" required></textarea>
        </label>
        <label>
          Notes
          <textarea id="f-notes" rows="3"></textarea>
        </label>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" id="cancel-btn" class="btn">Cancel</button>
        </div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
